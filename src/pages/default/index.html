<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wewnętrzny błąd serwera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #f5f5f5;
      --accent: #ff3d00;
      --accent-dim: #ff3d0040;
      --muted: #666;
      --border: #222;
    }

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    z-index: 1;
}

.error-code {
    display: flex;
    gap: 0.5rem;
}

.digit {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(4rem, 15vw, 10rem);
    font-weight: 700;
    line-height: 1;
    color: var(--text);
    text-shadow: 0 0 40px var(--accent-dim);
}

.digit:nth-child(2) {
    color: var(--accent);
}

.content {
    text-align: center;
    max-width: 400px;
}

h1 {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    color: var(--accent);
}

.message {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    font-weight: 300;
}

.hint {
    font-size: 0.875rem;
    color: var(--border);
    font-family: 'JetBrains Mono', monospace;
}

.retry-btn {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.875rem 1.75rem;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.875rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.retry-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: -1;
}

.retry-btn:hover {
    color: var(--bg);
}

.retry-btn:hover::before {
    transform: translateX(0);
}

.btn-icon {
    width: 16px;
    height: 16px;
    transition: transform 0.3s ease;
}

.retry-btn:hover .btn-icon {
    animation: spin 0.6s ease;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">
      <span class="digit">5</span>
      <span class="digit">xx</span>
    </div>
    
    <div class="content">
      <h1>Wewnętrzny błąd serwera</h1>
      <p class="message">Coś poszło nie tak po stronie serwera.</p>
      <p class="message">Spróbuj odświeżyć stronę za chwilę.</p>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      <span class="btn-text">Odśwież</span>
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
    </button>
  </div>
</body>
</html>
