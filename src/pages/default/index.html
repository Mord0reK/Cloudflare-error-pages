<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wewnętrzny błąd serwera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="error-code">
      <span class="digit">5</span>
      <span class="digit">xx</span>
    </div>
    
    <div class="content">
      <h1>Wewnętrzny błąd serwera</h1>
      <p class="message">Coś poszło nie tak po stronie serwera.</p>
      <p class="message">Spróbuj odświeżyć stronę za chwilę.</p>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      <span class="btn-text">Odśwież</span>
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
    </button>
  </div>
</body>
</html>
